<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Planet!</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #e8f5e9;
    }
    h1 { color: #2e7d32; }
    #message { color: #555; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Hello Planet!</h1>
  <p id="message">Loading message from backend...</p>
  <script>
    fetch('/api/greet')
      .then(r => r.json())
      .then(data => document.getElementById('message').textContent = data.message)
      .catch(() => document.getElementById('message').textContent = 'Could not reach backend.');
  </script>
</body>
</html>
